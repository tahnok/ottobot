<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ottobot</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
        body {
            margin: 0;
            background: #111;
            color: #eee;
            font-family: system-ui, sans-serif;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            flex-wrap: nowrap;
            gap: 1rem;
            align-items: center;
            box-sizing: border-box;
            width: 100%;
            max-width: 100vw;
            padding: 0.75rem 1rem;
            background: #1b1b1b;
            border-bottom: 1px solid #333;
        }

        h1 {
            margin: 0;
            font-size: 1rem;
        }

        button, select {
            background: #2a2a2a;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 0.35rem 0.5rem;
        }

        button {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        #update {
            color: #f0c75e;
            border-color: #8a7438;
        }

        select {
            min-width: 0;
            max-width: 100%;
        }

        main {
            padding: 1rem;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font: 0.875rem/1.4 monospace;
        }

        .log-line {
            display: block;
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .status {
            margin-left: auto;
            min-width: 0;
            font-size: 0.85rem;
            color: #aaa;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status[data-state="connected"] {
            color: #6fda7b;
        }

        .status[data-state="disconnected"] {
            color: #ff6b6b;
        }

        .status[data-state="connecting"] {
            color: #f0c75e;
        }

        .update-status {
            min-width: 0;
            font-size: 0.85rem;
            color: #f0c75e;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .update-status:empty {
            display: none;
        }

        @media (max-width: 600px) {
            header {
                display: grid;
                grid-template-columns: auto minmax(0, 1fr) auto auto;
                gap: 0.5rem 0.375rem;
                padding: 0.5rem;
            }

            #service {
                width: 100%;
            }

            #update {
                grid-column: 1;
                grid-row: 2;
            }

            .status {
                grid-column: 2 / -1;
                grid-row: 2;
                justify-self: end;
                margin-left: 0;
                text-align: right;
            }

            .update-status {
                grid-column: 1 / -1;
                grid-row: 3;
                margin-left: 0;
                white-space: normal;
            }

            main {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Ottobot</h1>

        <select id="service">
            <option value="">All Docker services</option>
        </select>

        <button id="clear">Clear</button>
        <button id="pause">Pause</button>
        <button id="update">Run update</button>
        <span class="update-status" id="update-status" aria-live="polite"></span>

        <span class="status" id="status" data-state="connecting">Connecting...</span>
    </header>

    <main>
        <pre id="logs"></pre>
    </main>

    <script>
        const logs = document.getElementById('logs');
        const status = document.getElementById('status');
        const service = document.getElementById('service');
        const clear = document.getElementById('clear');
        const pause = document.getElementById('pause');
        const update = document.getElementById('update');
        const updateStatus = document.getElementById('update-status');

        let source = null;
        let paused = false;
        let buffer = [];
        let updateWasRunning = false;
        let uptimeTimer = null;
        let containerStartedAt = null;

        function formatUptime(milliseconds) {
            const totalSeconds = Math.max(0, Math.floor(milliseconds / 1000));
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const clock = [hours, minutes, seconds]
                .map(value => String(value).padStart(2, '0'))
                .join(':');

            return days ? `${days}d ${clock}` : clock;
        }

        function stopUptimeTicker() {
            window.clearInterval(uptimeTimer);
            uptimeTimer = null;
            containerStartedAt = null;
            status.removeAttribute('title');
        }

        function updateUptime() {
            if (containerStartedAt === null) {
                return;
            }

            status.dataset.state = 'connected';
            status.textContent = `Connected · Uptime ${formatUptime(Date.now() - containerStartedAt)}`;
        }

        async function startUptimeTicker(activeSource) {
            stopUptimeTicker();

            try {
                const params = new URLSearchParams();

                if (service.value && service.value !== '__ottobot_update_log__') {
                    params.set('service', service.value);
                }

                const response = await fetch('/container/status?' + params.toString());

                if (!response.ok) {
                    return;
                }

                const container = await response.json();
                const startedAt = new Date(container.started_at);

                if (Number.isNaN(startedAt.getTime()) ||
                    source !== activeSource || activeSource.readyState !== EventSource.OPEN) {
                    return;
                }

                containerStartedAt = startedAt.getTime();
                status.title = `Container started: ${startedAt.toLocaleString()}`;
                updateUptime();
                uptimeTimer = window.setInterval(updateUptime, 1000);
            } catch {
                // Keep the log connection usable if Docker status lookup fails.
            }
        }

        function appendLine(line) {
            if (paused) {
                buffer.push(line);
                return;
            }

            const logLine = document.createElement('span');
            logLine.className = 'log-line';
            logLine.textContent = line;
            logs.appendChild(logLine);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function connect() {
            if (source) {
                source.close();
            }

            stopUptimeTicker();

            const params = new URLSearchParams();

            if (service.value) {
                params.set('service', service.value);
            }

            status.dataset.state = 'connecting';
            status.textContent = 'Connecting...';

            source = new EventSource('/events?' + params.toString());

            const activeSource = source;

            source.onopen = () => {
                status.dataset.state = 'connected';
                status.textContent = 'Connected';
                startUptimeTicker(activeSource);
            };

            source.onmessage = event => {
                appendLine(event.data);
            };

            source.onerror = () => {
                stopUptimeTicker();
                status.dataset.state = 'disconnected';
                status.textContent = 'Disconnected';
            };
        }

        async function loadServices() {
            const response = await fetch('/services');
            const services = await response.json();

            for (const name of services) {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                service.appendChild(option);
            }

            const separator = document.createElement('option');
            separator.disabled = true;
            separator.textContent = '──────────';
            service.appendChild(separator);

            const updateLog = document.createElement('option');
            updateLog.value = '__ottobot_update_log__';
            updateLog.textContent = 'Ottobot update log';
            service.appendChild(updateLog);
        }

        function showUpdateState(state) {
            update.disabled = state.running;
            update.textContent = state.running ? 'Updating...' : 'Run update';

            if (state.running) {
                updateStatus.textContent = 'Maintenance update in progress';
            } else if (updateWasRunning && state.last_exit_code === 0) {
                updateStatus.textContent = 'Update completed';
            } else if (updateWasRunning && state.last_exit_code !== null) {
                updateStatus.textContent = 'Update failed; check the update log';
            }

            updateWasRunning = state.running;
        }

        async function refreshUpdateState() {
            try {
                const response = await fetch('/maintenance/update');

                if (response.ok) {
                    showUpdateState(await response.json());
                }
            } catch {
                // Keep the log connection usable if status polling fails.
            } finally {
                window.setTimeout(refreshUpdateState, 2000);
            }
        }

        clear.addEventListener('click', () => {
            logs.textContent = '';
            buffer = [];
        });

        pause.addEventListener('click', () => {
            paused = !paused;
            pause.textContent = paused ? 'Resume' : 'Pause';

            if (!paused && buffer.length) {
                for (const line of buffer) {
                    appendLine(line);
                }

                buffer = [];
            }
        });

        update.addEventListener('click', async () => {
            if (!window.confirm('Are you sure you want to run the Ottobot maintenance update now?')) {
                return;
            }

            update.disabled = true;
            updateStatus.textContent = 'Starting update...';

            try {
                const response = await fetch('/maintenance/update', {
                    method: 'POST',
                    headers: {'X-Ottobot-Action': 'maintenance-update'},
                });
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Unable to start update');
                }

                showUpdateState(result);
                service.value = '__ottobot_update_log__';
                logs.textContent = '';
                buffer = [];
                connect();
            } catch (error) {
                update.disabled = false;
                updateStatus.textContent = error.message;
            }
        });

        service.addEventListener('change', () => {
            logs.textContent = '';
            buffer = [];
            connect();
        });

        loadServices().finally(connect);
        refreshUpdateState();
    </script>
</body>
</html>
