# Example Ottobot config. Copy to ottobot.toml and edit, then run:
#
#     ottobot --serial /dev/ttyUSB0 --config ottobot.toml
#
# Every field is optional. Anything you leave out is not touched on the
# device, so the radio keeps whatever it already had. The real ottobot.toml
# holds your private key, so keep it out of version control.

# Advertised name of the bot/device. Also used for channel addressing.
name = "ottobot"

# How verbose the logs are. One of DEBUG, INFO, WARNING, ERROR, CRITICAL.
# Omit to keep the default (INFO). Use DEBUG to see ignored/non-command
# messages and per-command dispatch details.
# log_level = "INFO"

# The bot's key pair, as 128 hex chars (64 bytes). Pinning this here keeps
# the bot's identity stable across re-flashes or device swaps. Export the
# current one from a device if you want to reuse it.
# private_key = "0123...cdef"

# Channels to configure, repeat the [[channels]] block per channel.
[[channels]]
index = 0
name = "public"
# 16-byte secret as 32 hex chars. Omit to let the device derive it from the
# channel name (the MeshCore default for "#"-prefixed names).
# secret = "0123456789abcdef0123456789abcdef"

# Radio parameters. Omit the whole section to leave the radio alone. These
# values are how you pin a "region" — set them to your local mesh's preset.
[radio]
freq = 910.525
bw = 62.5
sf = 7
cr = 5

# Discord webhook sink. When webhook_url is set, every message seen on the
# public channel is mirrored to that Discord webhook. Omit to disable.
# [discord]
# webhook_url = "https://discord.com/api/webhooks/123456789/abcdefg"
