name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Check formatting
        run: uv run black --check .

      - name: Run tests
        run: uv run pytest

      - name: Type check
        run: uv run ty check

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v7

      # QEMU lets the amd64 runner build the arm64 image via emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only authenticate when we intend to push (i.e. `push` events).
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build a single-arch image we can load into the local daemon and run.
      # (Multiarch images can't be `load`ed, so the smoke test builds amd64
      # only; the layers are cached and reused by the multiarch build below.)
      - name: Build image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ottobot:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Boot the freshly built container. `--help` runs the entrypoint, which
      # imports ottobot.cli (and the whole command set) — catching breakage
      # like a missing/unimportable ottobot package before we publish.
      - name: Smoke test — container boots
        run: docker run --rm ottobot:smoke-test --help

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          # Multiarch so the image runs on x86 servers and arm64 (e.g. Raspberry Pi).
          platforms: linux/amd64,linux/arm64
          # Build on PRs to catch breakage, but only push on `push` events,
          # which the `on:` block scopes to the main branch and v* tags.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
